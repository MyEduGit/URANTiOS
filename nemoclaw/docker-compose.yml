# NemoClaw — local-first orchestration substrate
# Services bind to 127.0.0.1 by default. Public exposure requires explicit human approval.
# Generated by bootstrap. Do NOT modify without recording rationale in docs/.

name: nemoclaw

services:
  postgres:
    image: postgres:16-alpine
    container_name: nemoclaw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nemoclaw}
      POSTGRES_USER: ${POSTGRES_USER:-nemoclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nemoclaw} -d ${POSTGRES_DB:-nemoclaw}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nemoclaw-net

  redis:
    image: redis:7-alpine
    container_name: nemoclaw-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - ./redis/data:/data
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nemoclaw-net

  n8n:
    image: n8nio/n8n:latest
    container_name: nemoclaw-n8n
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_LISTEN_ADDRESS: "0.0.0.0"
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:?N8N_BASIC_AUTH_PASSWORD must be set}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY must be set}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-nemoclaw}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-nemoclaw}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ./n8n/data:/home/node/.n8n
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${N8N_PORT:-5678}:5678"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nemoclaw-net

  ollama:
    image: ollama/ollama:latest
    container_name: nemoclaw-ollama
    restart: unless-stopped
    volumes:
      - ./ollama/models:/root/.ollama
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${OLLAMA_PORT:-11434}:11434"
    networks:
      - nemoclaw-net

networks:
  nemoclaw-net:
    name: nemoclaw-net
    driver: bridge
